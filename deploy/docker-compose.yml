services:
  api:
    build:
      context: ..
      dockerfile: deploy/api.Dockerfile
    environment:
      MENTOR_INDEX_DATABASE_URL: ${MENTOR_INDEX_DATABASE_URL}
      MENTOR_INDEX_EMBEDDING_BACKEND: ${MENTOR_INDEX_EMBEDDING_BACKEND:-sentence-transformers}
      MENTOR_INDEX_EMBEDDING_MODEL: ${MENTOR_INDEX_EMBEDDING_MODEL:-BAAI/bge-small-zh-v1.5}
      MENTOR_INDEX_EMBEDDING_DEVICE: ${MENTOR_INDEX_EMBEDDING_DEVICE:-cpu}
      MENTOR_INDEX_LLM_BASE_URL: ${MENTOR_INDEX_LLM_BASE_URL:-https://api.openai.com/v1}
      MENTOR_INDEX_LLM_API_KEY: ${MENTOR_INDEX_LLM_API_KEY:-}
      MENTOR_INDEX_LLM_MODEL: ${MENTOR_INDEX_LLM_MODEL:-gpt-4o-mini}
    volumes:
      - ${MENTORDB_DATA_DIR:-./data}:/data
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: deploy/web.Dockerfile
      args:
        NEXT_PUBLIC_MENTORDB_API_BASE_URL: ${NEXT_PUBLIC_MENTORDB_API_BASE_URL:-/api}
    environment:
      MENTORDB_API_BASE_URL: ${MENTORDB_API_BASE_URL:-http://api:8000}
      NEXT_PUBLIC_MENTORDB_API_BASE_URL: ${NEXT_PUBLIC_MENTORDB_API_BASE_URL:-/api}
    restart: unless-stopped
    depends_on:
      - api

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${MENTORDB_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web
    restart: unless-stopped
